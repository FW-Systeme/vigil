name: CI

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Test
        run: go test -race -count=1 ./...

      - name: Coverage check
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | awk '/^total:/ {
            gsub(/%/,"",$3); if ($3+0 < 85)
              {printf "FAIL: coverage %.1f%% < 85%%\n", $3; exit 1}
              else {printf "PASS: coverage %.1f%%\n", $3}}'

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Build binary
        run: |
          go build -ldflags="-X main.version=${{ github.ref_name }}" \
            -o vigil ./cmd/vigil

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vigil
          generate_release_notes: true
